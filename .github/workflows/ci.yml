name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Lint with py_compile
        run: |
          python -m py_compile main.py
          python -m py_compile ui/main_window.py
          python -m py_compile core/engine.py
          python -m py_compile core/cache.py
          python -m py_compile core/history.py
          python -m py_compile core/task.py
          python -m py_compile core/enums.py
          python -m py_compile core/scheduler.py
          python -m py_compile core/verifier.py

      - name: Run tests
        run: |
          python -m pytest tests/ -v

  build:
    runs-on: windows-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --noconsole --name "Sassi Downloader" --icon=icon.ico --collect-data customtkinter --hidden-import customtkinter --hidden-import yt_dlp main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sassi-Downloader-Windows
          path: dist/Sassi Downloader.exe
