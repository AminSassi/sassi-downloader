name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest-cov

      - name: Lint with Ruff
        continue-on-error: true
        run: |
          ruff check core/ ui/ main.py --select E,F,W --ignore E501,E741,F821,F401

      - name: Lint with py_compile
        run: |
          python -m py_compile main.py
          python -m py_compile ui/main_window.py
          python -m py_compile core/engine.py
          python -m py_compile core/cache.py
          python -m py_compile core/history.py
          python -m py_compile core/task.py
          python -m py_compile core/enums.py
          python -m py_compile core/scheduler.py
          python -m py_compile core/verifier.py

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --cov=core --cov-report=term-missing

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sassi-Downloader-Windows
          path: dist/Sassi Downloader.exe

      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: checksum
          path: checksum.txt
